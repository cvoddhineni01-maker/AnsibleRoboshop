- name: Create ec2 and r53
  hosts: local
  gather_facts: no
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-0db110084486818ff
    zone_id: "Z05660673G75FK1II7TFX"
    domain_name: "devopsplayground.fun"
    instance:
      - mongodb

  tasks:
    - name: Create EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        instance_type: t3.micro
        security_group: "{{ sg_id }}"
        image_id: "{{ ami_id }}"
        tags:
          Name: "{{ item }}"
      loop: "{{ instance }}"
      register: ec2_output

    - name: Print EC2 instance details
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"